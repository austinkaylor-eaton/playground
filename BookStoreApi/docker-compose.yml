services:
  mongodb:
    image: mongo:8.0
    container_name: bookstore-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: BookStore

volumes:
  mongodb_data:

